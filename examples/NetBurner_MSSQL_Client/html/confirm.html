<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confirm SQL Write</title>
<!--CPPCALL ShowAutoRefresh -->
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="nb-header">
  <div class="nb-header-inner">
    <img class="nb-header-logo" src="images/logo.png" alt="NetBurner">
    <div class="nb-title-block"><h1>NetBurner MSSQL Client</h1><span class="meta">NANO54415 · <!--CPPCALL ShowHeaderTarget --></span></div>
    <!--CPPCALL ShowHeaderStatus -->
  </div>
  <nav class="nb-main-nav"><div class="nb-main-nav-inner">
    <!--CPPCALL ShowAppNav -->
  </div></nav>
</header>
<main class="nb-page nb-page-compact">
  <div class="nb-card">
    <div class="nb-card-header"><span>Confirm Write Operation</span></div>
    <p class="nb-inline-help">This operation has not run yet. Review the generated SQL, then confirm or cancel.</p>
    <!--CPPCALL ShowPendingMutation -->
    <form class="nb-form-actions" action="confirmmutation" method="post">
      <button type="submit" class="nb-btn"<!--CPPCALL ShowPendingConfirmDisabled -->>Confirm and Execute</button>
      <button type="submit" class="nb-btn nb-btn-secondary" formaction="cancelmutation" formmethod="post">Cancel</button>
    </form>
  </div>
</main>
<footer class="nb-footer"><span>You can do that with a NetBurner!</span></footer>
</body>
</html>
